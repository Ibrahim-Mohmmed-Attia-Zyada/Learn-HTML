<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web</title>
    
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #e5ebff;
      }
      nav {
        margin: 50px;
        padding: 20px;
        text-align: center;
        background-color: rgb(248, 8, 40);
      }
      #start {
        text-decoration: none;
      }
      h2 {
        background-color: rgb(241, 241, 246); /* اللون الأبيض الحالي للخلفية */
        color: rgb(32, 11, 219); /* لون النص الأصلي */
        padding: 10px;
        margin: 0;
        transition: all 0.3s ease; /* إضافة حركة ناعمة وسلسة أثناء التحول */
      }
      
      /* التعديل الجديد: بمجرد تمرير الماوس فوق الرابط تتغير الخلفية والنص فوراً */
      #start:hover h2 {
        background-color: rgb(249, 255, 66); /* لون الخلفية الجديد عند الماوس عليه */
        color: rgb(255, 255, 255); /* لون النص الجديد عند الماوس عليه */
      }
    </style>
  </head>

  <body>
    <br /><br /><br /><br /><br /><br /><br /><br />
  <hr />
    <nav>
      <a id="start" href="Task1.html">
        <h2>ابدرحلتك🔎👋</h2>
      </a>
      <br />
    </nav>
    <hr />
    <br />
     <br /><br /><br /><br /><br /><br /><br /><br />
  </body>
</html>
