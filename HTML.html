<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Celebration Web Page</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(-45deg, #ff4b2b, #ff416c, #4facfe, #00f2fe);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        color: #fff;
        text-align: center;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      header {
        padding: 50px;
        font-size: 40px;
        font-weight: bold;
        animation: fadeIn 2s ease-in-out;
      }

      .container {
        display: flex;
        flex-direction: column;
        /* 👈 ده المهم */
        align-items: center;
        /* يخليهم في النص */
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        margin: 20px;
        padding: 20px;
        width: 250px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        animation: slideUp 1s ease-in-out;
      }

      .card:hover {
        transform: scale(1.1);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      }

      .card h2 {
        color: #ff4b2b;
        margin-bottom: 10px;
      }

      button {
        background: #ff4b2b;
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.3s;
        margin: 30px auto;
        display: block;
      }

      div {
        background-color: blueviolet;
        padding: 15px;
      }

      button:hover {
        background: #ff1e00;
        transform: scale(1.2);
      }

      footer {
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        text-align: center;
        padding: 15px;
        margin-top: 30px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }

        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <h1>Learn HTML & CSS</h1>
    <p>ابدأ رحلتك في تصميم المواقع 🚀</p>

    <div class="container">
      <div class="card">
        <h2>HTML</h2>
        <p>Structure of the web: headings, paragraphs, images, links.</p>
      </div>

      <div class="card">
        <h2>CSS</h2>
        <p>Design the web: colors, layouts, fonts, animations.</p>
      </div>

      <div class="card">
        <h2>JavaScript</h2>
        <p>Make it dynamic: interactivity, events, effects, logic.</p>
      </div>
    </div>

    <button id="celebrateBtn">Celebrate 🎊</button>

    <footer>
      <p>&copy; 2026 Celebration Project</p>
    </footer>

    <script>
      // 🎊 Confetti Effect
      document
        .getElementById("celebrateBtn")
        .addEventListener("click", function () {
          for (let i = 0; i < 100; i++) {
            let confetti = document.createElement("div");
            confetti.innerHTML = "🥰😍";
            confetti.style.position = "fixed";
            confetti.style.left = Math.random() * window.innerWidth + "px";
            confetti.style.top = Math.random() * window.innerHeight + "px";
            confetti.style.fontSize = Math.random() * 30 + 10 + "px";
            confetti.style.animation = "fall 3s linear forwards";
            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 300000);
          }
          alert("🔥 Welcome Engineer Ibrahim Ziada, to the private website👨‍💻");
        });

      // Falling animation
      const style = document.createElement("style");
      style.innerHTML = `
        @keyframes fall {
            from {transform: translateY(-100px); opacity: 1;}
            to {transform: translateY(500px); opacity: 0;}
        }
    `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
